<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Shorts Generator</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-900 text-white p-6">
    <div class="max-w-xl mx-auto mt-10 bg-gray-800 p-8 rounded-lg shadow-xl">
        <h1 class="text-3xl font-bold text-blue-400 mb-6 text-center">🎬 AI Video Maker</h1>
        <form id="videoForm" class="space-y-4">
            <div>
                <label>Keywords (e.g. biology, doctor, books)</label>
                <input type="text" name="keywords" required class="w-full mt-1 p-2 bg-gray-700 rounded text-white" placeholder="biology, doctor, books">
            </div>
            <div>
                <label>Upload Audio (MP3/WAV)</label>
                <input type="file" name="audio_file" accept="audio/*" required class="w-full mt-1 p-2 bg-gray-700 rounded">
            </div>
            <button type="submit" id="submitBtn" class="w-full bg-blue-600 hover:bg-blue-700 p-3 rounded font-bold">Generate Video</button>
        </form>
        <div id="loading" class="hidden mt-6 text-center text-blue-400 animate-pulse">Editing video... Please wait 1-3 minutes.</div>
        <div id="result" class="hidden mt-6 text-center">
            <h2 class="text-green-400 font-bold mb-2">✅ Video Ready!</h2>
            <video id="outputVideo" controls class="w-full rounded mb-4"><source src="" type="video/mp4"></video>
            <a id="downloadBtn" href="" download="NMDCAT_Short.mp4" class="bg-green-600 p-2 rounded text-white font-bold block">Download</a>
        </div>
    </div>
    <script>
        document.getElementById('videoForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submitBtn'), loading = document.getElementById('loading'), result = document.getElementById('result');
            btn.classList.add('hidden'); result.classList.add('hidden'); loading.classList.remove('hidden');
            const res = await fetch('/generate-video', { method: 'POST', body: new FormData(e.target) });
            const data = await res.json();
            if (data.status === 'success') {
                const vidSrc = data.video_url + '?t=' + new Date().getTime();
                document.getElementById('outputVideo').src = vidSrc;
                document.getElementById('downloadBtn').href = vidSrc;
                loading.classList.add('hidden'); result.classList.remove('hidden'); btn.classList.remove('hidden'); btn.innerText = "Make Another";
            } else { alert('Error: ' + data.error); loading.classList.add('hidden'); btn.classList.remove('hidden'); }
        });
    </script>
</body>
</html>
